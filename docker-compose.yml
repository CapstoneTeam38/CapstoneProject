version: '3.8'

services:

  flask:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuralguard-flask
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralguard-node
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - flask
    restart: unless-stopped